<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 개인대시보드 Slack</title>

    <!-- PWA 설정 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#fef033">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <!-- 스타일 불러오기 -->
    <script>
        fetch('style.html').then(r => r.text()).then(t => {
            document.head.insertAdjacentHTML('beforeend', t);
        });
    </script>
</head>
<body>
    <!-- 로딩 중 표시 -->
    <div id="loading" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fef3c7,#fde68a);font-family:sans-serif;z-index:99999;">
        <div style="text-align:center;">
            <div style="font-size:60px;animation:bounce 1s infinite;">💬</div>
            <div style="font-size:16px;font-weight:700;color:#1e293b;margin-top:10px;">Slack 대시보드 로딩 중...</div>
        </div>
    </div>
    <style>
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>

    <!-- body.html + app.js + multi_window.js 순서대로 로드 -->
    <script>
        (async function() {
            try {
                // [v3.2] cache-bust: 매 로드마다 새 파일 받기 (PWA/SW 캐시 우회)
                var __cb = '?v=' + Date.now();
                var __fetchOpt = { cache: 'no-store' };

                // 1. body.html 로드
                const bodyRes = await fetch('body.html' + __cb, __fetchOpt);
                const bodyHtml = await bodyRes.text();
                document.body.insertAdjacentHTML('beforeend', bodyHtml);

                // 2. app.js 로드
                const appRes = await fetch('app.js' + __cb, __fetchOpt);
                let appJs = await appRes.text();
                appJs = appJs.replace(/<\/?script[^>]*>/g, '');

                const scriptEl = document.createElement('script');
                scriptEl.textContent = appJs;
                document.body.appendChild(scriptEl);

                // 3. multi_window.js 로드 (PC 멀티윈도우 + 팝업 도우미)
                const mwRes = await fetch('multi_window.js' + __cb, __fetchOpt);
                const mwJs = await mwRes.text();
                const mwScript = document.createElement('script');
                mwScript.textContent = mwJs;
                document.body.appendChild(mwScript);

                // 4. 로딩 화면 제거
                setTimeout(() => {
                    const loading = document.getElementById('loading');
                    if (loading) loading.style.display = 'none';
                }, 500);

                // 5. Service Worker 등록 (알림용) — [v3.8] controller 자동 활성화
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.register('sw.js').then(function(reg) {
                        // SW가 새로 install 됐는데 현재 페이지를 제어 안 하면 → 한 번만 reload
                        //   (알림 정확히 뜨려면 controller 필요)
                        if (reg.active && !navigator.serviceWorker.controller) {
                            if (!sessionStorage.getItem('sw_claimed_v38')) {
                                sessionStorage.setItem('sw_claimed_v38', '1');
                                // 부드럽게 SW가 clients.claim() 하도록 약간 대기
                                setTimeout(function() {
                                    if (!navigator.serviceWorker.controller) {
                                        console.log('[SW] controller 없음 → reload');
                                        window.location.reload();
                                    }
                                }, 1500);
                            }
                        }
                    }).catch(function(e) { console.log('SW 등록 실패:', e); });
                    // controller 바뀌면 로그
                    navigator.serviceWorker.addEventListener('controllerchange', function() {
                        console.log('[SW] controller 활성화됨');
                    });
                }
            } catch(e) {
                document.getElementById('loading').innerHTML =
                    '<div style="text-align:center;color:#ef4444;"><div style="font-size:50px;">😢</div><div>로딩 실패: ' + e.message + '</div></div>';
            }
        })();
    </script>
</body>
</html>
