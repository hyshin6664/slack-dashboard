<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slack 대시보드 - 테스트</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header .emoji {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .header h1 {
            color: #1e293b;
            font-size: 24px;
            margin-bottom: 8px;
        }

        .header .subtitle {
            color: #64748b;
            font-size: 14px;
        }

        .status-box {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .status-box h3 {
            color: #475569;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #e2e8f0;
        }

        .status-item:last-child { border-bottom: none; }

        .status-item .label { color: #64748b; }
        .status-item .value { color: #1e293b; font-weight: 600; }
        .status-item .ok { color: #10b981; }
        .status-item .fail { color: #ef4444; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #fef033;
            color: #1e293b;
        }

        .btn-primary:hover {
            background: #fde047;
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 20px;
            padding: 16px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.5;
            display: none;
        }

        .result-box.success {
            background: #d1fae5;
            border: 2px solid #10b981;
            color: #065f46;
            display: block;
        }

        .result-box.error {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #991b1b;
            display: block;
        }

        .result-box.loading {
            background: #dbeafe;
            border: 2px solid #3b82f6;
            color: #1e40af;
            display: block;
        }

        .chat-preview {
            background: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }

        .chat-preview h3 {
            color: #475569;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .bubble-row {
            display: flex;
            align-items: flex-end;
            gap: 6px;
            margin-bottom: 8px;
        }

        .bubble-row.mine { justify-content: flex-end; }

        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #3b82f6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
        }

        .bubble {
            padding: 8px 12px;
            border-radius: 14px;
            font-size: 13px;
            max-width: 70%;
        }

        .bubble.theirs {
            background: white;
            border: 1px solid #e2e8f0;
        }

        .bubble.mine {
            background: #fef033;
            color: #1e293b;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            color: #94a3b8;
            font-size: 11px;
        }

        .version {
            display: inline-block;
            padding: 2px 8px;
            background: #f1f5f9;
            border-radius: 10px;
            color: #475569;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="emoji">💬</div>
            <h1>Slack 대시보드</h1>
            <div class="subtitle">GitHub Pages 테스트 버전</div>
        </div>

        <!-- 상태 정보 -->
        <div class="status-box">
            <h3>📊 시스템 상태</h3>
            <div class="status-item">
                <span class="label">호스팅</span>
                <span class="value ok" id="hosting">✅ GitHub Pages</span>
            </div>
            <div class="status-item">
                <span class="label">HTTPS 보안</span>
                <span class="value ok" id="https">✅ 활성화됨</span>
            </div>
            <div class="status-item">
                <span class="label">브라우저</span>
                <span class="value" id="browser">확인 중...</span>
            </div>
            <div class="status-item">
                <span class="label">알림 권한</span>
                <span class="value" id="notif">확인 중...</span>
            </div>
            <div class="status-item">
                <span class="label">서비스 워커 지원</span>
                <span class="value" id="sw">확인 중...</span>
            </div>
        </div>

        <!-- 카톡 스타일 미리보기 -->
        <div class="chat-preview">
            <h3>🎨 카톡 스타일 미리보기</h3>
            <div class="bubble-row">
                <div class="avatar">박</div>
                <div class="bubble theirs">안녕하세요! 테스트 메시지예요 👋</div>
            </div>
            <div class="bubble-row mine">
                <div class="bubble mine">네 잘 보이네요! ✨</div>
            </div>
        </div>

        <!-- 연결 테스트 버튼 -->
        <button class="btn btn-primary" onclick="testConnection()" style="margin-top: 20px;">
            🔌 Apps Script 연결 테스트
        </button>

        <!-- 결과 박스 -->
        <div class="result-box" id="result"></div>

        <!-- 푸터 -->
        <div class="footer">
            <span class="version">v0.1 test</span>
            <div style="margin-top: 8px;">
                GitHub Pages로 호스팅됨 ✨
            </div>
        </div>
    </div>

    <script>
        // 페이지 로드 시 상태 체크
        window.addEventListener('load', function() {
            // 브라우저 확인
            var ua = navigator.userAgent;
            var browser = 'Unknown';
            if (ua.indexOf('Chrome') !== -1) browser = '✅ Chrome';
            else if (ua.indexOf('Edge') !== -1) browser = '✅ Edge';
            else if (ua.indexOf('Firefox') !== -1) browser = '✅ Firefox';
            else if (ua.indexOf('Safari') !== -1) browser = '✅ Safari';
            document.getElementById('browser').textContent = browser;
            document.getElementById('browser').className = 'value ok';

            // 알림 권한 확인
            if (typeof Notification !== 'undefined') {
                var perm = Notification.permission;
                var text = '';
                var cls = '';
                if (perm === 'granted') { text = '✅ 허용됨'; cls = 'ok'; }
                else if (perm === 'denied') { text = '❌ 거부됨'; cls = 'fail'; }
                else { text = '⚠️ 미설정 (허용 가능)'; cls = ''; }
                document.getElementById('notif').textContent = text;
                document.getElementById('notif').className = 'value ' + cls;
            } else {
                document.getElementById('notif').textContent = '❌ 지원 안함';
                document.getElementById('notif').className = 'value fail';
            }

            // 서비스 워커 지원 확인 (PWA용)
            if ('serviceWorker' in navigator) {
                document.getElementById('sw').textContent = '✅ 지원됨 (PWA 가능)';
                document.getElementById('sw').className = 'value ok';
            } else {
                document.getElementById('sw').textContent = '❌ 지원 안함';
                document.getElementById('sw').className = 'value fail';
            }
        });

        // Apps Script 연결 테스트
        function testConnection() {
            var resultBox = document.getElementById('result');
            resultBox.className = 'result-box loading';
            resultBox.innerHTML = '⏳ 연결 중... 잠시만요!';

            // 테스트: 간단한 fetch (나중에 Apps Script URL로 교체)
            setTimeout(function() {
                resultBox.className = 'result-box success';
                resultBox.innerHTML =
                    '✅ <strong>기본 테스트 성공!</strong><br>' +
                    '• 페이지 로딩: 정상<br>' +
                    '• CSS 스타일: 정상<br>' +
                    '• JavaScript 동작: 정상<br>' +
                    '• 카톡 스타일 렌더링: 정상<br><br>' +
                    '🎯 다음 단계: Apps Script 연결 설정이 필요해요!';
            }, 1000);
        }
    </script>
</body>
</html>
